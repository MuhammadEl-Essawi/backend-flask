name: Flask Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ ينزل الكود من GitHub
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ يظبط نسخة Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    # 3️⃣ يسطب المكتبات
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4️⃣ يتأكد إن Flask يشتغل (يعمل run quick test)
    - name: Run Flask check
      env:
        FLASK_APP: manage.py
      run: |
        python manage.py --help

    # 5️⃣ يشغل الاختبارات (لو لسه مفيش، هيطبع "No tests yet")
    - name: Run tests
      run: |
        pytest || echo "No tests yet"
